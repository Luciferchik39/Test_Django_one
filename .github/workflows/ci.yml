name: CI Checks

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: django_star_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install

      - name: Lint with Ruff
        run: |
          poetry run ruff check . --fix

      - name: Type check with Mypy
        run: |
          poetry run mypy src/ apps/ manage.py

      - name: Security check with Bandit
        run: |
          poetry run bandit -r src/ apps/ manage.py -s B311,B324

      - name: Complexity check with Radon
        run: |
          poetry run radon cc src/ apps/ manage.py -s -a

      - name: Run tests
        env:
          USE_POSTGRES: "True"
          DB_NAME: django_star_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DEBUG: "False"
        run: |
          poetry run pytest -v