version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: django_star_db
    environment:
      - POSTGRES_DB=${DB_NAME:-django_star_db}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    image: django_star:${APP_VERSION:-1.0.0}
    container_name: django_star_app
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    environment:
      - INSIDE_CONTAINER=true
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key}
      - DEBUG=${DEBUG:-False}
      - DJANGO_SETTINGS_MODULE=Django_star.settings
      - PYTHONPATH=/app/src:/app/apps
      - PYTHONUNBUFFERED=1
      - USE_POSTGRES=True
      - DB_NAME=${DB_NAME:-django_star_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - LOGURU_LEVEL=${LOGURU_LEVEL:-INFO}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  postgres_data: