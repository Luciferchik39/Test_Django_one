# .gitlab-ci.yml
# CI/CD для Test_Django_one

stages:
  - lint
  - type-check
  - security
  - complexity
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POETRY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/poetry"

cache:
  paths:
    - .cache/pip
    - .cache/poetry
    - .venv

# Базовый образ
image: python:3.12-slim

# Подготовка окружения (шаблон)
.before_script_template: &before_script
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gcc libpq-dev curl make
    - pip install --no-cache-dir poetry
    - poetry config virtualenvs.in-project true
    - poetry install --no-interaction --no-ansi

# ============================================
# 1. Lint (Ruff)
# ============================================
lint:
  stage: lint
  <<: *before_script
  script:
    - make lint
  allow_failure: false
  tags:
    - docker

# ============================================
# 2. Type Check (Mypy)
# ============================================
type-check:
  stage: type-check
  <<: *before_script
  script:
    - make type
  allow_failure: false
  tags:
    - docker

# ============================================
# 3. Security (Bandit)
# ============================================
security:
  stage: security
  <<: *before_script
  script:
    - make security
  allow_failure: false
  tags:
    - docker

# ============================================
# 4. Complexity (Radon)
# ============================================
complexity:
  stage: complexity
  <<: *before_script
  script:
    - make cc
  allow_failure: false
  tags:
    - docker

# ============================================
# 5. Tests (Pytest)
# ============================================
test:
  stage: test
  <<: *before_script
  services:
    - postgres:17-alpine
  variables:
    POSTGRES_DB: django_star_db
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    USE_POSTGRES: "True"
    DEBUG: "False"
  script:
    - make test
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
    expire_in: 7 days
  tags:
    - docker

# ============================================
# 6. Build Docker (опционально)
# ============================================
build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --pull -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - develop
  tags:
    - docker